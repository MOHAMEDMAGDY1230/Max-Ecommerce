<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/payment.css">
    <title>Payment Page</title>
</head>
<body>
<div class="cont">
    <form action="payment.php" method="POST">

        <div class="row">

            <div class="col">
                <h3 class="title">Billing Address</h3>

                <div class="inputBox">
                    <span>Full Name :</span>
                    <input type="text" name="full_name" placeholder="Enter your name" required>
                </div>
                <div class="inputBox">
                    <span>Email :</span>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="inputBox">
                    <span>Address :</span>
                    <input type="text" name="address" placeholder="Enter your address" required>
                </div>
                <div class="inputBox">
                    <span>Phone Number :</span>
                    <input type="text" name="phone_number" placeholder="Enter your phone number" required>
                </div>
                <div class="flex">
                    <div class="inputBox">
                        <span>Country :</span>
                        <input type="text" name="country" placeholder="Egypt">
                    </div>
                    <div class="inputBox">
                        <span>City :</span>
                        <input type="text" name="city" placeholder="Mansoura">
                    </div>
                </div>
            </div>

            <div class="col">
                <h3 class="title">Payment</h3>

                <div class="inputBox">
                    <span>Cards Accepted :</span>
                    <img src="img/card_img.png" alt="">
                </div>
                <div class="inputBox">
                    <span>Name on Card :</span>
                    <input type="text" name="card_name" placeholder="Enter the name on the card" required>
                </div>
                <div class="inputBox">
                    <span>Credit Card Number :</span>
                    <input type="number" name="card_number" placeholder="1111-2222-3333-4444" required>
                </div>
                <div class="inputBox">
                    <span>Exp Month :</span>
                    <input type="text" name="exp_month" placeholder="January" required>
                </div>
                <div class="flex">
                    <div class="inputBox">
                        <span>Exp Year :</span>
                        <input type="number" name="exp_year" placeholder="2024" required>
                    </div>
                    <div class="inputBox">
                        <span>CVV :</span>
                        <input type="text" name="cvv" placeholder="1234" required>
                    </div>
                </div>
            </div>

        </div>

        <input type="submit" value="Submit" class="submit-btn">

    </form>
</div>
</body>
</html>
